name = "zekoro-fun"
main = "src/worker.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# -------------------------------------------------------------------
# KV namespace for email storage
# After deploying run:
#   npx wrangler kv namespace create EMAILS_KV
# Then paste the returned id below.
# For local dev wrangler auto-creates a local KV store.
# -------------------------------------------------------------------
[[kv_namespaces]]
binding = "EMAILS_KV"
id = "YOUR_KV_NAMESPACE_ID"
preview_id = "YOUR_KV_NAMESPACE_ID"

# -------------------------------------------------------------------
# Email handler — Cloudflare Email Routing will invoke this worker.
# In the Cloudflare dashboard: Email > Email Routing > Routing Rules
# Add a catch-all rule → Action: "Send to a Worker" → select this worker.
# -------------------------------------------------------------------
[vars]
WEBHOOK_SECRET = ""
